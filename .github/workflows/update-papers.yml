name: Weekly paper update (OpenAlex)

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      since_days:
        description: 'Look back N days for new papers'
        required: false
        default: '7'
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Import new papers from OpenAlex
        run: |
          SINCE="${{ inputs.since_days || '7' }}"
          echo "Fetching papers from last $SINCE days"
          python scripts/import_openalex.py --since-days $SINCE

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain papers/)" ]; then
            COUNT=$(git status --porcelain papers/ | wc -l)
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Found $COUNT new/modified paper files"
            git status --porcelain papers/ | head -20
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new papers"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Bot: add ${{ steps.check.outputs.count }} new papers from OpenAlex (weekly)"
          branch: bot/update-papers-${{ github.run_id }}
          delete-branch: true
          title: "Weekly paper update: ${{ steps.check.outputs.count }} new papers"
          body: |
            Auto-import from OpenAlex (last ${{ inputs.since_days || '7' }} days):

            - `title:"age of information"` (recent)
            - `title:"age of incorrect information"`, semantic + age, goal-oriented, VoI + age

            **Review checklist:**
            - [ ] Titles are relevant to AoI / semantics / goal-oriented
            - [ ] No obvious duplicates (normalized title check)
            - [ ] Labels look reasonable (auto-inferred)

            Merging will trigger deploy to https://age-and-semantics-information.github.io/

            Generated by `.github/workflows/update-papers.yml` cron.
          labels: |
            bot
            automated
          draft: false
